# Pipeline monorepo.
#
# packages/* — shared libraries (the single-source-of-truth classifier + contract).
# apps/*     — the hosted product (Phase 2): api (Fastify) + web (React/Vite).
#
# The existing Electron desktop app (root package.json + package-lock.json) and the
# zero-dependency Python local build (server.py / providers.py) are deliberately
# LEFT ALONE and keep shipping via npm — see docs/Pipeline-Transformation-Plan.md §13.
packages:
  - "packages/*"
  - "apps/*"
